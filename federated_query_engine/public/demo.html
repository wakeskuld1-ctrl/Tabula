<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Federated Query Excel Demo</title>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/css/pluginsCss.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/plugins.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/css/luckysheet.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/assets/iconfont/iconfont.css' />
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/luckysheet.umd.js"></script>
</head>
<body style="margin:0;padding:0;overflow:hidden;">
    <div id="luckysheet" style="margin:0px;padding:0px;position:absolute;width:100%;height:100%;left:0px;top:0px;"></div>
    <script>
        $(function () {
            // Configuration
            var options = {
                container: 'luckysheet', // container id
                title: 'Federated Query Demo', // table title
                lang: 'en', // language
                showinfobar: false, // hide info bar
                data: [
                    {
                        "name": "Query Results", // sheet name
                        "color": "", // sheet color
                        "status": 1, // active
                        "order": 0, // order
                        "celldata": [
                             { "r": 0, "c": 0, "v": { "v": "ID", "m": "ID", "bg": "#f3f4f6", "bl": 1, "ht": 0 } },
                             { "r": 0, "c": 1, "v": { "v": "Transaction Code", "m": "Transaction Code", "bg": "#f3f4f6", "bl": 1, "ht": 0 } },
                             { "r": 0, "c": 2, "v": { "v": "Amount", "m": "Amount", "bg": "#f3f4f6", "bl": 1, "ht": 0 } },
                             { "r": 0, "c": 3, "v": { "v": "Status", "m": "Status", "bg": "#f3f4f6", "bl": 1, "ht": 0 } },
                             
                             { "r": 1, "c": 0, "v": { "v": 1, "m": "1" } },
                             { "r": 1, "c": 1, "v": { "v": "TXN_DEMO_001", "m": "TXN_DEMO_001" } },
                             { "r": 1, "c": 2, "v": { "v": 1250.50, "m": "1250.50", "ct": { "fa": "#,##0.00", "t": "n" } } },
                             { "r": 1, "c": 3, "v": { "v": "Completed", "m": "Completed", "fc": "#10b981" } },
                             
                             { "r": 2, "c": 0, "v": { "v": 2, "m": "2" } },
                             { "r": 2, "c": 1, "v": { "v": "TXN_DEMO_002", "m": "TXN_DEMO_002" } },
                             { "r": 2, "c": 2, "v": { "v": 500.00, "m": "500.00", "ct": { "fa": "#,##0.00", "t": "n" } } },
                             { "r": 2, "c": 3, "v": { "v": "Pending", "m": "Pending", "fc": "#f59e0b" } }
                        ],
                        "config": {
                            "col": {
                                "0": { "w": 50 },
                                "1": { "w": 150 },
                                "2": { "w": 100 },
                                "3": { "w": 100 }
                            }
                        }
                    }
                ]
            }
            luckysheet.create(options)
        })
    </script>
</body>
</html>
